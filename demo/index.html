<!DOCTYPE html>
<html>
<head>
    <title>EchoLink Digital Twin | IWS</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
    <script>
    // On mobile (touch + small screen), redirect to Fly backend directly.
    // WebGL in iframes is unreliable on mobile browsers.
    if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || ('ontouchstart' in window && innerWidth < 1024)) {
        window.location.replace('https://echolink-backend.fly.dev/demo/?eval=genius-ny');
    }
    </script>
</head>
<body>
    <iframe src="https://echolink-backend.fly.dev/demo/"></iframe>
</body>
</html>
