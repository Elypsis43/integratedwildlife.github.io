<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHOLINK | IWS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #010204; }
        iframe { width: 100%; height: 100%; border: none; }
        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #010204; color: #2d5a27; font-family: system-ui; font-size: 1.2rem; letter-spacing: 0.1em; text-transform: uppercase; z-index: 10; transition: opacity 0.6s; }
        #loading.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loading">ECHOLINK</div>
    <iframe id="demo" src="https://echolink-backend.fly.dev/demo/"
            onload="document.getElementById('loading').classList.add('hidden')"
            allow="geolocation; camera; microphone; fullscreen"></iframe>
</body>
</html>
